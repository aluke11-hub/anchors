<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firm Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2530;
    --accent: #c8a96e; --accent2: #4a9eff; --text: #e8eaf0; --text-muted: #6b7280;
    --tag-ns: #1a3a2a; --tag-ns-c: #4ade80; --tag-def: #1a2a3a; --tag-def-c: #60a5fa;
    --tag-cyber: #2a1a3a; --tag-cyber-c: #c084fc; --tag-hs: #3a2a1a; --tag-hs-c: #fb923c;
    --tag-ai: #1a3a3a; --tag-ai-c: #2dd4bf; --tag-trade: #3a3a1a; --tag-trade-c: #facc15;
    --tag-tech: #2a1a1a; --tag-tech-c: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; font-size: 14px; }

header { border-bottom: 1px solid var(–border); padding: 16px 28px; display: flex; align-items: center; gap: 16px; background: var(–surface); position: sticky; top: 0; z-index: 100; }
header h1 { font-family: ‘Playfair Display’, serif; font-size: 20px; font-weight: 900; color: var(–accent); }
header span { font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; color: var(–text-muted); letter-spacing: 1px; text-transform: uppercase; }
.header-right { margin-left: auto; }
.export-btn { padding: 6px 14px; background: transparent; border: 1px solid var(–accent); color: var(–accent); font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; border-radius: 4px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; }
.export-btn:hover { background: var(–accent); color: #000; }

.toolbar { padding: 10px 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(–border); background: var(–surface); position: sticky; top: 55px; z-index: 99; }
.toolbar label { font-size: 11px; color: var(–text-muted); font-family: ‘IBM Plex Mono’, monospace; text-transform: uppercase; letter-spacing: 1px; }
.filter-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(–border); background: transparent; color: var(–text-muted); font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(–accent); color: var(–accent); }
.filter-btn.active { background: var(–accent); color: #000; border-color: var(–accent); font-weight: 600; }
.sort-select, .type-select { padding: 4px 8px; background: var(–surface2); border: 1px solid var(–border); color: var(–text); font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; border-radius: 4px; cursor: pointer; }
.sort-select { margin-left: auto; }

.cities { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 112px); }
.city-col { padding: 18px 24px; border-right: 1px solid var(–border); }
.city-col:last-child { border-right: none; }
.city-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(–border); }
.city-name { font-family: ‘Playfair Display’, serif; font-size: 17px; font-weight: 700; }
.city-count { font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; color: var(–text-muted); }
.anchor-count { font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; color: var(–accent); }

.firm-card { background: var(–surface); border: 1px solid var(–border); border-radius: 6px; padding: 12px 14px; margin-bottom: 7px; transition: border-color 0.15s; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.firm-card:hover { border-color: #2d3748; }
.firm-card.anchor { border-color: rgba(200,169,110,0.5); background: linear-gradient(135deg, #111318, #13110d); }

.firm-top { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
.firm-name { font-family: ‘Playfair Display’, serif; font-size: 14px; font-weight: 700; line-height: 1.3; }
.anchor-star { color: var(–accent); margin-right: 3px; }
.firm-meta { font-family: ‘IBM Plex Mono’, monospace; font-size: 9px; color: var(–text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }
.firm-revenue { font-family: ‘IBM Plex Mono’, monospace; font-size: 12px; font-weight: 500; color: var(–accent); white-space: nowrap; text-align: right; }
.firm-revenue small { display: block; font-size: 9px; color: var(–text-muted); font-weight: 400; }
.firm-desc { font-size: 12px; color: var(–text-muted); line-height: 1.5; margin-bottom: 7px; }

.contacts-label { font-family: ‘IBM Plex Mono’, monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(–accent2); margin-bottom: 4px; }
.contact-item { font-size: 11px; color: #a0aec0; margin-bottom: 2px; line-height: 1.4; }
.contact-item strong { color: var(–text); font-weight: 600; }
.contact-item em { color: var(–text-muted); font-style: normal; font-size: 10px; }

.firm-tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 7px 0; }
.tag { padding: 2px 7px; border-radius: 3px; font-family: ‘IBM Plex Mono’, monospace; font-size: 10px; font-weight: 500; }
.tag-ns { background: var(–tag-ns); color: var(–tag-ns-c); }
.tag-def { background: var(–tag-def); color: var(–tag-def-c); }
.tag-cyber { background: var(–tag-cyber); color: var(–tag-cyber-c); }
.tag-hs { background: var(–tag-hs); color: var(–tag-hs-c); }
.tag-ai { background: var(–tag-ai); color: var(–tag-ai-c); }
.tag-trade { background: var(–tag-trade); color: var(–tag-trade-c); }
.tag-tech { background: var(–tag-tech); color: var(–tag-tech-c); }

.firm-actions { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.btn-small { padding: 3px 8px; border-radius: 3px; border: 1px solid var(–border); background: transparent; color: var(–text-muted); font-family: ‘IBM Plex Mono’, monospace; font-size: 10px; cursor: pointer; transition: all 0.15s; }
.btn-small:hover { border-color: var(–accent); color: var(–accent); }
.firm-card.anchor .btn-anchor { border-color: var(–accent); color: var(–accent); }
.has-notes-badge { font-family: ‘IBM Plex Mono’, monospace; font-size: 10px; color: var(–accent2); }

.notes-area { margin-top: 8px; width: 100%; background: var(–surface2); border: 1px solid var(–border); border-radius: 4px; color: var(–text); font-family: ‘IBM Plex Sans’, sans-serif; font-size: 12px; padding: 8px; resize: vertical; min-height: 56px; line-height: 1.5; outline: none; transition: border-color 0.15s; }
.notes-area:focus { border-color: var(–accent2); }
.notes-area::placeholder { color: var(–text-muted); }

.no-results { font-family: ‘IBM Plex Mono’, monospace; font-size: 12px; color: var(–text-muted); text-align: center; padding: 40px 0; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(–surface); border: 1px solid var(–border); border-radius: 8px; padding: 26px 28px; max-width: 660px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-family: ‘Playfair Display’, serif; font-size: 18px; color: var(–accent); margin-bottom: 6px; }
.modal p { font-size: 12px; color: var(–text-muted); margin-bottom: 14px; }
.modal pre { background: var(–bg); border: 1px solid var(–border); border-radius: 4px; padding: 12px; font-family: ‘IBM Plex Mono’, monospace; font-size: 10px; color: var(–text); white-space: pre-wrap; word-break: break-word; margin-bottom: 14px; max-height: 38vh; overflow-y: auto; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-btn { padding: 7px 14px; border-radius: 4px; cursor: pointer; font-family: ‘IBM Plex Mono’, monospace; font-size: 11px; border: 1px solid var(–border); background: transparent; color: var(–text-muted); transition: all 0.15s; }
.modal-btn.primary { border-color: var(–accent); color: var(–accent); }
.modal-btn:hover { background: var(–surface2); }
.modal-btn.primary:hover { background: var(–accent); color: #000; }

@media (max-width: 900px) { .cities { grid-template-columns: 1fr; } .city-col { border-right: none; border-bottom: 1px solid var(–border); } }
</style>

</head>
<body>

<header>
  <h1>Firm Intelligence</h1>
  <span>BD Pipeline · DC &amp; New York</span>

<div class="cities">

  <div class="city-col">

      <span class="city-count" id="ny-count"></span>
      <span class="anchor-count" id="ny-anchor-count"></span>
    </div>
    <div id="ny-firms"></div>
  </div>
</div>

<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>Anchor Client Pipeline</h2>
    <p>Your marked anchor firms — copy or download as CSV to import into CRM or Excel.</p>
    <pre id="exportContent"></pre>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeExport()">Close</button>
      <button class="modal-btn primary" onclick="copyExport()">Copy to Clipboard</button>
      <button class="modal-btn primary" onclick="downloadExport()">Download CSV</button>
    </div>
  </div>
</div>

let activeFilter='all', activeSort='name', activeType='all';
const anchors=new Set(), notes={}, notesOpen=new Set();

function getTypeCategory(t) {
  if (t.includes('Law')) return 'Law Firm';
  if (t.includes('Lobby')) return 'Lobbying';
  return 'Consulting';
}

function renderFirms() {
  ['dc','ny'].forEach(city => {
    const container = document.getElementById(`${city}-firms`);
    let firms = FIRMS.filter(f => f.city===city);
    if (activeFilter!=='all') firms = firms.filter(f=>f.tags.includes(activeFilter));
    if (activeType!=='all') firms = firms.filter(f=>getTypeCategory(f.type)===activeType);
    firms.sort((a,b)=>{
      if (activeSort==='revenue') return b.revNum-a.revNum;
      if (activeSort==='type') return a.type.localeCompare(b.type);
      if (activeSort==='anchor') { const d=+(anchors.has(b.name))-+(anchors.has(a.name)); return d||a.name.localeCompare(b.name); }
      return a.name.localeCompare(b.name);
    });
    const ac = firms.filter(f=>anchors.has(f.name)).length;
    document.getElementById(`${city}-count`).textContent = `${firms.length} firms`;
    document.getElementById(`${city}-anchor-count`).textContent = ac ? `· ${ac} anchored` : '';
    if (!firms.length) { container.innerHTML='<div class="no-results">No firms match this filter</div>'; return; }
    container.innerHTML = firms.map(f=>{
      const isA=anchors.has(f.name), nOpen=notesOpen.has(f.name), nVal=notes[f.name]||'';
      const safeN = f.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="firm-card ${isA?'anchor':''}">
        <div class="firm-top">
          <div>
            <div class="firm-name">${isA?'<span class="anchor-star">★</span>':''}${f.name}</div>
            <div class="firm-meta">${f.type}</div>
          </div>
          <div><div class="firm-revenue">${f.revenue}<small>est. annual revenue</small></div></div>
        </div>
        <div class="firm-desc">${f.desc}</div>
        <div style="margin-bottom:7px">
          <div class="contacts-label">Key Contacts</div>
          ${f.contacts.map(c=>`<div class="contact-item"><strong>${c.name}</strong> <em>— ${c.title}</em></div>`).join('')}
        </div>
        <div class="firm-tags">${f.tags.map(t=>`<span class="tag tag-${t}">${TAG_LABELS[t]}</span>`).join('')}</div>
        <div class="firm-actions">
          <button class="btn-small btn-anchor" onclick="toggleAnchor('${safeN}')">${isA?'★ Anchor':'☆ Mark Anchor'}</button>
          <button class="btn-small" onclick="toggleNotes('${safeN}')">${nOpen?'▲ Hide Notes':'▼ '+(nVal?'View Notes':'Add Notes')}</button>
          ${nVal&&!nOpen?'<span class="has-notes-badge">📝 notes</span>':''}
        </div>
        ${nOpen?`<textarea class="notes-area" placeholder="BD notes, meetings, next steps…" onchange="saveNote('${safeN}',this.value)">${nVal}</textarea>`:''}

```
  </div>`;
}).join('');
```

});
}

function toggleAnchor(n) { anchors.has(n)?anchors.delete(n):anchors.add(n); renderFirms(); }
function toggleNotes(n) { notesOpen.has(n)?notesOpen.delete(n):notesOpen.add(n); renderFirms(); }
function saveNote(n,v) { notes[n]=v; }

document.querySelectorAll(’.filter-btn’).forEach(btn=>btn.addEventListener(‘click’,()=>{
document.querySelectorAll(’.filter-btn’).forEach(b=>b.classList.remove(‘active’));
btn.classList.add(‘active’); activeFilter=btn.dataset.filter; renderFirms();
}));
document.getElementById(‘sortSelect’).addEventListener(‘change’,e=>{activeSort=e.target.value;renderFirms();});
document.getElementById(‘typeSelect’).addEventListener(‘change’,e=>{activeType=e.target.value;renderFirms();});

function openExport() {
const af=FIRMS.filter(f=>anchors.has(f.name));
if (!af.length) { alert(‘No anchors marked yet. Click “☆ Mark Anchor” on firms first.’); return; }
const header=‘Firm,City,Type,Revenue,Practices,Key Contacts,Notes’;
const rows=af.map(f=>{
const n=(notes[f.name]||’’).replace(/\n/g,’ | ‘);
return [f.name, f.city.toUpperCase(), f.type, f.revenue, f.tags.map(t=>TAG_LABELS[t]).join(’; ‘), f.contacts.map(c=>`${c.name} (${c.title})`).join(’; ‘), n].map(v=>`"${v}"`).join(’,’);
});
document.getElementById(‘exportContent’).textContent=[header,…rows].join(’\n’);
document.getElementById(‘exportModal’).classList.add(‘open’);
}
function closeExport() { document.getElementById(‘exportModal’).classList.remove(‘open’); }
function copyExport() { navigator.clipboard.writeText(document.getElementById(‘exportContent’).textContent).then(()=>alert(‘Copied!’)); }
function downloadExport() {
const blob=new Blob([document.getElementById(‘exportContent’).textContent],{type:‘text/csv’});
const a=document.createElement(‘a’); a.href=URL.createObjectURL(blob); a.download=‘anchor_pipeline.csv’; a.click();
}
document.getElementById(‘exportModal’).addEventListener(‘click’,e=>{ if(e.target===document.getElementById(‘exportModal’))closeExport(); });

renderFirms();
</script>
