<style>
:root {
  --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#1e2530;

  --ns-bg:#1a3a2a;--ns-c:#4ade80;--def-bg:#1a2a3a;--def-c:#60a5fa;
  --cyber-bg:#2a1a3a;--cyber-c:#c084fc;--hs-bg:#3a2a1a;--hs-c:#fb923c;
  --ai-bg:#1a3a3a;--ai-c:#2dd4bf;--trade-bg:#3a3a1a;--trade-c:#facc15;
  --tech-bg:#2a1a1a;--tech-c:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;}
header{border-bottom:1px solid var(--border);padding:15px 28px;display:flex;align-items:center;gap:16px;background:var(--surface);position:sticky;top:0;z-index:100;}
header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--accent);}
.sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.hdr-right{margin-left:auto;}
.export-btn{padding:6px 14px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:4px;cursor:pointer;transition:all .15s;}
.export-btn:hover{background:var(--accent);color:#000;}
.toolbar{padding:10px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:54px;z-index:99;}
.tlabel{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
.fbtn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;}
.fbtn:hover{border-color:var(--accent);color:var(--accent);}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.tselect{padding:4px 8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:4px;cursor:pointer;}
.sort-sel{margin-left:auto;}
.cities{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 112px);}
.col{padding:18px 24px;border-right:1px solid var(--border);}
.col:last-child{border-right:none;}
.col-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border);}
.col-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
.col-ct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.anch-ct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:7px;transition:border-color .15s;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:#2d3748;}
.card.anchor{border-color:rgba(200,169,110,.5);background:linear-gradient(135deg,#111318,#13110d);}
.card-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:5px;}
.firm-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;line-height:1.3;}
.astar{color:var(--accent);margin-right:3px;}
.firm-meta{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
.revenue{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);white-space:nowrap;text-align:right;}
.revenue small{display:block;font-size:9px;color:var(--muted);font-weight:400;}
.desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:7px;}
.contacts-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin-bottom:4px;}
.contact{font-size:11px;color:#a0aec0;margin-bottom:2px;line-height:1.4;}
.contact strong{color:var(--text);font-weight:600;}
.contact em{color:var(--muted);font-style:normal;font-size:10px;}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin:7px 0;}
.tag{padding:2px 7px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;}
.t-ns{background:var(--ns-bg);color:var(--ns-c);}
.t-def{background:var(--def-bg);color:var(--def-c);}
.t-cyber{background:var(--cyber-bg);color:var(--cyber-c);}
.t-hs{background:var(--hs-bg);color:var(--hs-c);}
.t-ai{background:var(--ai-bg);color:var(--ai-c);}
.t-trade{background:var(--trade-bg);color:var(--trade-c);}
.t-tech{background:var(--tech-bg);color:var(--tech-c);}
.actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.sbtn{padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;}
.sbtn:hover{border-color:var(--accent);color:var(--accent);}
.card.anchor .abtn{border-color:var(--accent);color:var(--accent);}
.note-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent2);}
.notes-area{margin-top:8px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:8px;resize:vertical;min-height:56px;line-height:1.5;outline:none;transition:border-color .15s;}
.notes-area:focus{border-color:var(--accent2);}
.notes-area::placeholder{color:var(--muted);}
.empty{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-align:center;padding:40px 0;}
.errmsg{background:#2a0a0a;border:1px solid #f87171;border-radius:4px;padding:10px 14px;margin:10px 0;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#f87171;}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
.modal-wrap.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:26px 28px;max-width:660px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);margin-bottom:6px;}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.modal pre{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:10px;white-space:pre-wrap;word-break:break-word;margin-bottom:14px;max-height:38vh;overflow-y:auto;}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;}
.mbtn{padding:7px 14px;border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.mbtn.p{border-color:var(--accent);color:var(--accent);}
.mbtn:hover{background:var(--surface2);}
.mbtn.p:hover{background:var(--accent);color:#000;}
@media(max-width:900px){.cities{grid-template-columns:1fr;}.col{border-right:none;border-bottom:1px solid var(--border);}}
</style>
</head>

</div>

var anchors = {};
var notes = {};
var notesOpen = {};
var activeFilter = “all”;
var activeSort = “name”;
var activeType = “all”;

function esc(s) {
return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
}

function render() {
try {
var cities = [“dc”,“ny”];
for (var ci = 0; ci < cities.length; ci++) {
var city = cities[ci];
var list = document.getElementById(city + “-list”);
if (!list) continue;

```
  var firms = [];
  for (var i = 0; i < FIRMS.length; i++) {
    var f = FIRMS[i];
    if (f.city !== city) continue;
    if (activeType !== "all" && f.type !== activeType) continue;
    if (activeFilter !== "all" && f.tags.indexOf(activeFilter) < 0) continue;
    firms.push(f);
  }

  firms.sort(function(a, b) {
    if (activeSort === "rev") return b.rev - a.rev;
    if (activeSort === "type") return a.typeLabel < b.typeLabel ? -1 : 1;
    if (activeSort === "anchor") {
      var diff = (anchors[b.name] ? 1 : 0) - (anchors[a.name] ? 1 : 0);
      return diff !== 0 ? diff : (a.name < b.name ? -1 : 1);
    }
    return a.name < b.name ? -1 : 1;
  });

  var ac = 0;
  for (var j = 0; j < firms.length; j++) { if (anchors[firms[j].name]) ac++; }
  document.getElementById(city + "-ct").textContent = firms.length + " firms";
  document.getElementById(city + "-ac").textContent = ac ? "(" + ac + " anchored)" : "";

  if (firms.length === 0) {
    list.innerHTML = '<div class="empty">No firms match this filter</div>';
    list._firms = [];
    continue;
  }

  var html = "";
  for (var k = 0; k < firms.length; k++) {
    var f = firms[k];
    var isA = !!anchors[f.name];
    var nOpen = !!notesOpen[f.name];
    var nVal = notes[f.name] || "";

    var tagHtml = "";
    for (var t = 0; t < f.tags.length; t++) {
      tagHtml += '<span class="tag t-' + f.tags[t] + '">' + TL[f.tags[t]] + '</span>';
    }

    var contactHtml = "";
    for (var co = 0; co < f.contacts.length; co++) {
      contactHtml += '<div class="contact"><strong>' + esc(f.contacts[co][0]) + '</strong>'
        + ' <em>&mdash; ' + esc(f.contacts[co][1]) + '</em></div>';
    }

    html += '<div class="card' + (isA ? ' anchor' : '') + '">';
    html += '<div class="card-top">';
    html += '<div><div class="firm-name">';
    if (isA) html += '<span class="astar">&#9733;</span>';
    html += esc(f.name) + '</div>';
    html += '<div class="firm-meta">' + esc(f.typeLabel) + '</div></div>';
    html += '<div><div class="revenue">' + esc(f.revenue) + '<small>est. annual revenue</small></div></div>';
    html += '</div>';
    html += '<div class="desc">' + esc(f.desc) + '</div>';
    html += '<div style="margin-bottom:7px"><div class="contacts-lbl">Key Contacts</div>' + contactHtml + '</div>';
    html += '<div class="tags">' + tagHtml + '</div>';
    html += '<div class="actions">';
    html += '<button class="sbtn abtn" data-idx="' + k + '" data-city="' + city + '" onclick="toggleAnchor(this)">';
    html += (isA ? '&#9733; Anchor' : '&#9734; Mark Anchor') + '</button>';
    html += '<button class="sbtn" data-idx="' + k + '" data-city="' + city + '" onclick="toggleNotes(this)">';
    html += (nOpen ? '&#9650; Hide Notes' : '&#9660; ' + (nVal ? 'View Notes' : 'Add Notes')) + '</button>';

function toggleAnchor(btn) {
var city = btn.getAttribute(“data-city”);
var idx = parseInt(btn.getAttribute(“data-idx”), 10);
var f = document.getElementById(city + “-list”)._firms[idx];
anchors[f.name] = !anchors[f.name];
render();
}

function toggleNotes(btn) {
var city = btn.getAttribute(“data-city”);
var idx = parseInt(btn.getAttribute(“data-idx”), 10);
var f = document.getElementById(city + “-list”)._firms[idx];
notesOpen[f.name] = !notesOpen[f.name];
render();
}

function saveNote(ta) {
var city = ta.getAttribute(“data-city”);
var idx = parseInt(ta.getAttribute(“data-idx”), 10);
var f = document.getElementById(city + “-list”)._firms[idx];
notes[f.name] = ta.value;
}

var filterBtns = document.querySelectorAll(”.fbtn”);
for (var fb = 0; fb < filterBtns.length; fb++) {
filterBtns[fb].addEventListener(“click”, function() {
for (var x = 0; x < filterBtns.length; x++) filterBtns[x].classList.remove(“active”);
this.classList.add(“active”);
activeFilter = this.getAttribute(“data-f”);
render();
});
}

document.getElementById(“typeS”).addEventListener(“change”, function() { activeType = this.value; render(); });
document.getElementById(“sortS”).addEventListener(“change”, function() { activeSort = this.value; render(); });

document.getElementById(“exportBtn”).addEventListener(“click”, function() {
var af = [];
for (var i = 0; i < FIRMS.length; i++) { if (anchors[FIRMS[i].name]) af.push(FIRMS[i]); }
if (!af.length) { alert(“No anchors marked yet. Click the star button on firms first.”); return; }
var rows = [“Firm,City,Type,Revenue,Practices,Key Contacts,Notes”];
for (var i = 0; i < af.length; i++) {
var f = af[i];
var practices = [];
for (var t = 0; t < f.tags.length; t++) practices.push(TL[f.tags[t]]);
var contacts = [];
for (var c = 0; c < f.contacts.length; c++) contacts.push(f.contacts[c][0] + “ (” + f.contacts[c][1] + “)”);
var row = [f.name, f.city.toUpperCase(), f.typeLabel, f.revenue, practices.join(”; “), contacts.join(”; “), (notes[f.name] || “”).replace(/\n/g, “ | “)];
rows.push(row.map(function(v) { return ‘”’ + String(v).replace(/”/g, ‘””’) + ‘”’; }).join(”,”));
}
document.getElementById(“exportPre”).textContent = rows.join(”\n”);
document.getElementById(“exportModal”).classList.add(“open”);
});

document.getElementById(“closeBtn”).addEventListener(“click”, function() { document.getElementById(“exportModal”).classList.remove(“open”); });
document.getElementById(“exportModal”).addEventListener(“click”, function(e) { if (e.target === this) this.classList.remove(“open”); });
document.getElementById(“copyBtn”).addEventListener(“click”, function() {
navigator.clipboard.writeText(document.getElementById(“exportPre”).textContent).then(function() { alert(“Copied!”); });
});
document.getElementById(“dlBtn”).addEventListener(“click”, function() {
var blob = new Blob([document.getElementById(“exportPre”).textContent], {type:“text/csv”});
var a = document.createElement(“a”); a.href = URL.createObjectURL(blob); a.download = “anchor_pipeline.csv”; a.click();
});

render();
